server:
  port: 8081

spring:
  application:
    name: student-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/campusconnect}
      # Build @Indexed indexes (e.g. the unique tenants.slug) lazily on first entity use.
      auto-index-creation: true

# Actuator: expose health (+ info) for the AC and ops probes.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# springdoc / Swagger UI at /swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

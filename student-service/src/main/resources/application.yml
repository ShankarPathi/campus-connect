server:
  port: 8081

spring:
  application:
    name: student-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/campusconnect}
      # Build @Indexed indexes (e.g. the unique tenants.slug) lazily on first entity use.
      auto-index-creation: true
  # Email (Story 2.1): dev target is Mailpit (localhost:1025, no auth). Brevo SMTP is wired in Epic 10.
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

# Email-verification link sent to registrants. token-ttl controls how long a link stays valid.
app:
  verification:
    base-url: ${VERIFY_BASE_URL:http://localhost:8081/api/student/auth/verify-email}
    token-ttl: ${VERIFY_TOKEN_TTL:PT24H}
  # Auth abuse throttling (Story 2.5, NFR-2): in-memory per-instance fixed-window limits.
  ratelimit:
    login:
      limit: ${RATELIMIT_LOGIN_LIMIT:5}
      window: ${RATELIMIT_LOGIN_WINDOW:PT15M}
    otp:
      limit: ${RATELIMIT_OTP_LIMIT:3}
      window: ${RATELIMIT_OTP_WINDOW:PT1H}

# Actuator: expose health (+ info) for the AC and ops probes.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# springdoc / Swagger UI at /swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# JWT signing secret — override in prod via JWT_SECRET env var (must be >= 32 bytes for HS256).
security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-0123456789-abcdefghijklmnop}

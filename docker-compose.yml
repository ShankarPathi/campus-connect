# Campus Connect — LOCAL DEV infrastructure only (Story 1.1).
# Brings up the backing services the Spring Boot apps talk to.
# The Java services themselves are run from the IDE or `mvn spring-boot:run`.
# The full containerized stack (services + Caddy + monitoring) is Story 10.1
# in docker-compose.prod.yml — NOT here.
#
#   docker compose up -d
#   MongoDB   → localhost:27017
#   MinIO     → API localhost:9000, Console http://localhost:9101  (minioadmin / minioadmin)
#               (console host port is 9101 to avoid a clash with a pre-existing
#                process on 9001; container-internal port is still 9001)
#   Mailpit   → SMTP localhost:1025, Web UI http://localhost:8025

services:
  mongodb:
    image: mongo:8.0
    container_name: cc-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: cc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9101:9001"   # Web console (host 9101 → container 9001)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.30.1
    container_name: cc-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

volumes:
  mongo-data:
  minio-data:

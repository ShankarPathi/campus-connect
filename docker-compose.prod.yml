# Campus Connect — PRODUCTION stack (Story 10.1 + 10.3 deploy).
# One host: Caddy (HTTPS + SPA) → api-gateway → 3 services → MongoDB + MinIO.
# Secrets/config come from a sibling `.env` (see .env.example) — never hard-coded here.
#
#   cp .env.example .env          # fill in DOMAIN, ACME_EMAIL, GHCR_OWNER + the secrets
#   docker login ghcr.io          # to pull the private service images
#   docker compose -f docker-compose.prod.yml up -d
#
# The service images are pulled from ghcr.io (built + pushed by CI, Story 10.2). Caddy is the only
# public ingress (80/443). Story 10.4 attaches prometheus/grafana/uptime-kuma + mongodump backups.

# Shared env for the three role services (gateway has its own block below).
x-service-env: &service-env
  # Spring Boot 4 reads the Mongo connection from spring.mongodb.uri (NOT the pre-4
  # spring.data.mongodb.uri the app.yml still declares) — see DEPLOY.md "Known issue".
  SPRING_MONGODB_URI: mongodb://mongodb:27017/campusconnect
  # External SMTP must not gate container health / trigger restart loops.
  MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
  # HTTPS is terminated by Caddy → mark the refresh-token cookie Secure (Story 10.3). SameSite=Lax
  # stays correct because the SPA is served same-origin by Caddy (no cross-origin / no CSRF needed).
  APP_AUTH_COOKIE_SECURE: "true"
  # Fail fast if the operator forgot to populate .env (rather than silently using a weak default).
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (see .env.example)}
  MAIL_HOST: ${MAIL_HOST}
  MAIL_PORT: ${MAIL_PORT}
  MAIL_USERNAME: ${MAIL_USERNAME}
  MAIL_PASSWORD: ${MAIL_PASSWORD}
  STORAGE_ENDPOINT: http://minio:9000
  STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
  STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  STORAGE_BUCKET: campus-connect

x-service-defaults: &service-defaults
  restart: unless-stopped
  # 768m (vs the -Xmx384m heap) leaves headroom for metaspace + thread stacks + direct buffers,
  # so the kernel OOM-killer can't crash-loop a service under load. 4×768m fits the 24GB budget.
  mem_limit: 768m
  networks: [cc-net]

services:
  caddy:
    # Builds the SPA and serves it + proxies /api with automatic HTTPS (Story 10.3).
    build:
      context: .
      dockerfile: caddy/Dockerfile
    image: campus-connect/caddy:latest
    restart: unless-stopped
    mem_limit: 128m
    networks: [cc-net]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set in .env (your DuckDNS subdomain)}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL must be set in .env (Let's Encrypt contact)}
    volumes:
      - caddy-data:/data   # persists the Let's Encrypt cert across restarts (avoid rate limits)
      - caddy-config:/config
    depends_on:
      api-gateway:
        condition: service_healthy

  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    mem_limit: 512m
    networks: [cc-net]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    mem_limit: 512m
    networks: [cc-net]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # One-shot: create the private resume/offer-PDF bucket, then exit.
  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    networks: [cc-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/campus-connect &&
      echo 'bucket campus-connect ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: "no"

  student-service:
    <<: *service-defaults
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER must be set in .env (lowercase ghcr owner)}/campus-connect-student-service:latest
    environment:
      <<: *service-env
      VERIFY_BASE_URL: https://${DOMAIN}/verify-email?portal=student
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  recruiter-service:
    <<: *service-defaults
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER must be set in .env (lowercase ghcr owner)}/campus-connect-recruiter-service:latest
    environment:
      <<: *service-env
      VERIFY_BASE_URL: https://${DOMAIN}/verify-email?portal=recruiter
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  admin-service:
    <<: *service-defaults
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER must be set in .env (lowercase ghcr owner)}/campus-connect-admin-service:latest
    environment:
      <<: *service-env
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  api-gateway:
    <<: *service-defaults
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER must be set in .env (lowercase ghcr owner)}/campus-connect-api-gateway:latest
    # No host port — Caddy is the only public ingress and reaches the gateway on cc-net.
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (see .env.example)}
      STUDENT_SERVICE_URI: http://student-service:8081
      RECRUITER_SERVICE_URI: http://recruiter-service:8082
      ADMIN_SERVICE_URI: http://admin-service:8083
    depends_on:
      student-service:
        condition: service_healthy
      recruiter-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy

  # ── Monitoring + backups (Story 10.4) ── (image tags: verify/bump at deploy)
  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    mem_limit: 256m
    networks: [cc-net]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    mem_limit: 256m
    networks: [cc-net]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    mem_limit: 256m
    networks: [cc-net]
    volumes:
      - uptime-kuma-data:/app/data

  # Nightly mongodump + 7-day retention. Copy /backups OFF-BOX for a real backup (see DEPLOY.md).
  mongo-backup:
    image: mongo:8.0
    restart: unless-stopped
    mem_limit: 256m
    networks: [cc-net]
    entrypoint: ["/bin/sh", "/backup.sh"]
    volumes:
      - ./backup/backup.sh:/backup.sh:ro
      - backups:/backups
    depends_on:
      mongodb:
        condition: service_healthy

networks:
  cc-net:
    driver: bridge

volumes:
  mongo-data:
  minio-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
  uptime-kuma-data:
  backups:

# Campus Connect — PRODUCTION stack (Story 10.1).
# The full backend on one host: MongoDB + MinIO + the 4 Spring Boot services.
# Secrets come from a sibling `.env` (see .env.example) — never hard-coded here.
#
#   cp .env.example .env   # then fill in real values
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Only the API gateway publishes a host port (8080). In Story 10.3 Caddy fronts it for HTTPS and
# serves the built SPA; in Story 10.4 prometheus/grafana/uptime-kuma + mongodump backups attach.
# Those are the documented extension seams — NOT implemented here.

# Shared env for the three role services (gateway has its own block below).
x-service-env: &service-env
  # Spring Boot 4 reads the Mongo connection from spring.mongodb.uri (NOT the pre-4
  # spring.data.mongodb.uri the app.yml still declares) — see DEPLOY.md "Known issue".
  SPRING_MONGODB_URI: mongodb://mongodb:27017/campusconnect
  # External SMTP must not gate container health / trigger restart loops.
  MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
  # Fail fast if the operator forgot to populate .env (rather than silently using a weak default).
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (see .env.example)}
  MAIL_HOST: ${MAIL_HOST}
  MAIL_PORT: ${MAIL_PORT}
  MAIL_USERNAME: ${MAIL_USERNAME}
  MAIL_PASSWORD: ${MAIL_PASSWORD}
  STORAGE_ENDPOINT: http://minio:9000
  STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
  STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  STORAGE_BUCKET: campus-connect

x-service-defaults: &service-defaults
  restart: unless-stopped
  # 768m (vs the -Xmx384m heap) leaves headroom for metaspace + thread stacks + direct buffers,
  # so the kernel OOM-killer can't crash-loop a service under load. 4×768m fits the 24GB budget.
  mem_limit: 768m
  networks: [cc-net]

services:
  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    mem_limit: 512m
    networks: [cc-net]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    mem_limit: 512m
    networks: [cc-net]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # One-shot: create the private resume/offer-PDF bucket, then exit.
  createbuckets:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    networks: [cc-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/campus-connect &&
      echo 'bucket campus-connect ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: "no"

  student-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: student-service/Dockerfile
    image: campus-connect/student-service:latest
    environment:
      <<: *service-env
      VERIFY_BASE_URL: ${STUDENT_VERIFY_BASE_URL:-http://localhost:8081/api/student/auth/verify-email}
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  recruiter-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: recruiter-service/Dockerfile
    image: campus-connect/recruiter-service:latest
    environment:
      <<: *service-env
      VERIFY_BASE_URL: ${RECRUITER_VERIFY_BASE_URL:-http://localhost:8082/api/recruiter/auth/verify-email}
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  admin-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    image: campus-connect/admin-service:latest
    environment:
      <<: *service-env
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  api-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: campus-connect/api-gateway:latest
    ports:
      - "8080:8080" # the only public entry; Caddy fronts this for HTTPS in Story 10.3
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (see .env.example)}
      STUDENT_SERVICE_URI: http://student-service:8081
      RECRUITER_SERVICE_URI: http://recruiter-service:8082
      ADMIN_SERVICE_URI: http://admin-service:8083
    depends_on:
      student-service:
        condition: service_healthy
      recruiter-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy

  # ── Extension seams (do NOT implement here) ──
  # caddy:       # Story 10.3 — HTTPS reverse-proxy + serves frontend/dist; depends_on api-gateway
  # prometheus / grafana / uptime-kuma:  # Story 10.4 — monitoring
  # mongo-backup:  # Story 10.4 — nightly mongodump + 7-day retention

networks:
  cc-net:
    driver: bridge

volumes:
  mongo-data:
  minio-data:

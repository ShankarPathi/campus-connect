# nginx for the AWS deploy: serve the Angular SPA + reverse-proxy /api to the gateway (same origin).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip the static bundle for a lighter first paint
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # API calls go to the gateway over the internal docker network (service name "api-gateway").
  location /api/ {
    proxy_pass http://api-gateway:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA routing — everything else falls back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}

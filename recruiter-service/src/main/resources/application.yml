server:
  port: 8082

spring:
  application:
    name: recruiter-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/campusconnect}
      # Build @Indexed indexes (e.g. the unique tenants.slug) lazily on first entity use.
      auto-index-creation: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

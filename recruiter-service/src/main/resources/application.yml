server:
  port: 8082

spring:
  application:
    name: recruiter-service
  # Boot 4: the MongoDB connection URI binds under spring.mongodb (NOT spring.data.mongodb).
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/campusconnect}
  data:
    mongodb:
      # Build @Indexed indexes (e.g. the unique tenants.slug) lazily on first entity use.
      auto-index-creation: true
  # Offer-letter upload (Story 7.1): servlet hard ceiling, set ABOVE app.offer.max-size-bytes so an oversized
  # file reaches the service's own size check (a clean 400) instead of a raw servlet rejection.
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:10MB}
  # Email (Story 2.2): dev target is Mailpit (localhost:1025, no auth). For a real authenticated relay
  # (e.g. Brevo) set MAIL_USERNAME/MAIL_PASSWORD + MAIL_SMTP_AUTH=true + MAIL_SMTP_STARTTLS=true.
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

# Email-verification link sent to recruiters (points at this service's verify endpoint).
app:
  verification:
    base-url: ${VERIFY_BASE_URL:http://localhost:8082/api/recruiter/auth/verify-email}
    token-ttl: ${VERIFY_TOKEN_TTL:PT24H}
  # Auto-verify (demo/no-mail deploys): when true, registration skips the verification email and
  # moves the recruiter straight to PENDING_APPROVAL. Default false → the real flow is unchanged.
  registration:
    auto-verify: ${AUTO_VERIFY:false}
  # Auth abuse throttling (Story 2.5, NFR-2): in-memory per-instance fixed-window limits.
  ratelimit:
    login:
      limit: ${RATELIMIT_LOGIN_LIMIT:5}
      window: ${RATELIMIT_LOGIN_WINDOW:PT15M}
    otp:
      limit: ${RATELIMIT_OTP_LIMIT:3}
      window: ${RATELIMIT_OTP_WINDOW:PT1H}
  # Object storage (Story 6.1): the SAME private bucket student-service writes résumés to — recruiters read an
  # applicant's frozen snapshot via a short-lived pre-signed URL. Construction does no network I/O (the bean is
  # safe even where MinIO is absent, e.g. CI); signing a GET URL is a local operation.
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_BUCKET:campus-connect}
  # Offer-letter PDF size cap (Story 7.1): mirrors student-service app.resume.max-size-bytes. The servlet
  # multipart ceiling above is set higher so this check (a 400 VALIDATION_ERROR) is what an oversized file hits.
  offer:
    max-size-bytes: ${OFFER_MAX_SIZE_BYTES:5242880}   # 5 MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# JWT signing secret — override in prod via JWT_SECRET env var (must be >= 32 bytes for HS256).
security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-0123456789-abcdefghijklmnop}

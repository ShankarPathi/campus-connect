# Campus Connect — LIGHTWEIGHT deploy for a 1 GB AWS free-tier box (amd64).
#
# Runs MongoDB ON the box (plain, no TLS) instead of Atlas — the Java driver's TLS
# handshake to Atlas fails on this host (a known JSSE/Atlas issue), so we sidestep it.
# A one-shot seed restores the demo data (logins + drives + offers) on first boot.
# Frontend (nginx) serves the SPA + proxies /api → gateway on port 80.
#
#   cp .env.aws.example .env      # fill JWT_SECRET + GHCR_OWNER (Mongo URI is NOT needed now)
#   docker compose -f docker-compose.aws.yml up -d
#
# NOTE: file storage (MinIO) is omitted to save RAM, so résumé upload / offer-PDF download
# won't work. Everything else (logins, dashboards, drives, applications, offers, reports) works.

x-service-env: &service-env
  # Mongo runs on the box (service name "mongodb"), plaintext — no TLS to fail.
  SPRING_MONGODB_URI: mongodb://mongodb:27017/campusconnect
  MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
  # No SMTP server on this box → registration would fail with EMAIL_SEND_FAILED. Auto-verify skips
  # the verification email and activates accounts immediately (students ACTIVE, recruiters PENDING_APPROVAL).
  AUTO_VERIFY: "true"
  # Plain HTTP (no TLS yet) → the refresh cookie must NOT be Secure or the browser drops it.
  APP_AUTH_COOKIE_SECURE: "false"
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
  # Trim each JVM so the services + Mongo fit a 1 GB box (+ swap). SerialGC = lowest-memory collector.
  JAVA_TOOL_OPTIONS: "-Xmx180m -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks: [cc-net]
  init: true   # tini reaps health-check child processes (no zombie pile-up)
  depends_on:
    mongodb:
      condition: service_healthy
    mongo-seed:
      condition: service_completed_successfully

services:
  mongodb:
    image: mongo:6.0
    restart: unless-stopped
    networks: [cc-net]
    command: ["--wiredTigerCacheSizeGB", "0.25"]   # cap Mongo's cache so it fits the small box
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # One-shot: restore the demo data into `campusconnect` on first boot (skips if already seeded).
  mongo-seed:
    image: mongo:6.0
    networks: [cc-net]
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./deploy/seed:/seed:ro
    entrypoint:
      - sh
      - -c
      - |
        COUNT=$$(mongosh --quiet "mongodb://mongodb:27017/campusconnect" --eval "db.users.countDocuments()" 2>/dev/null || echo 0)
        if [ "$$COUNT" -gt 0 ] 2>/dev/null; then
          echo "already seeded ($$COUNT users) — skipping"
        else
          echo "seeding demo data..."
          mongorestore --uri="mongodb://mongodb:27017" --gzip --archive=/seed/campusconnect.archive.gz --nsFrom="test.*" --nsTo="campusconnect.*"
        fi

  student-service:
    <<: *service-defaults
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER in .env (lowercase ghcr owner)}/campus-connect-student-service:latest
    environment:
      <<: *service-env

  recruiter-service:
    <<: *service-defaults
    image: ghcr.io/${GHCR_OWNER}/campus-connect-recruiter-service:latest
    environment:
      <<: *service-env

  admin-service:
    <<: *service-defaults
    image: ghcr.io/${GHCR_OWNER}/campus-connect-admin-service:latest
    environment:
      <<: *service-env

  api-gateway:
    <<: *service-defaults
    image: ghcr.io/${GHCR_OWNER}/campus-connect-api-gateway:latest
    environment:
      JWT_SECRET: ${JWT_SECRET}
      STUDENT_SERVICE_URI: http://student-service:8081
      RECRUITER_SERVICE_URI: http://recruiter-service:8082
      ADMIN_SERVICE_URI: http://admin-service:8083
      JAVA_TOOL_OPTIONS: "-Xmx150m -XX:MaxMetaspaceSize=112m -XX:+UseSerialGC"
    depends_on:
      student-service:
        condition: service_started
      recruiter-service:
        condition: service_started
      admin-service:
        condition: service_started

  frontend:
    image: ghcr.io/${GHCR_OWNER}/campus-connect-frontend:latest
    restart: unless-stopped
    networks: [cc-net]
    # No host port — Caddy is the public entry now and reaches nginx on the internal network.
    depends_on:
      - api-gateway

  # Caddy: free automatic HTTPS (Let's Encrypt) for ${DOMAIN}, forwarding to the nginx frontend.
  # Needs ${DOMAIN} pointing at this box + inbound ports 80 AND 443 open in the AWS Security Group.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks: [cc-net]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env (your DuckDNS subdomain, e.g. campusconnect.duckdns.org)}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env (any email, for Let's Encrypt)}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # persists the HTTPS certificate across restarts (avoids rate limits)
      - caddy-config:/config
    depends_on:
      - frontend

networks:
  cc-net:
    driver: bridge

volumes:
  mongo-data:
  caddy-data:
  caddy-config:

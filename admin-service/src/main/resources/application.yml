server:
  port: 8083

spring:
  application:
    name: admin-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/campusconnect}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8083

spring:
  application:
    name: admin-service
  # Boot 4: the MongoDB connection URI binds under spring.mongodb (NOT spring.data.mongodb).
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/campusconnect}
  data:
    mongodb:
      # Build @Indexed indexes (e.g. the unique tenants.slug) lazily on first entity use.
      auto-index-creation: true
  # Email (Story 2.2): activates SmtpEmailService so approval/rejection notices are sent (Mailpit in dev).
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

# Auth abuse throttling (Story 2.5, NFR-2): in-memory per-instance fixed-window limits.
app:
  ratelimit:
    login:
      limit: ${RATELIMIT_LOGIN_LIMIT:5}
      window: ${RATELIMIT_LOGIN_WINDOW:PT15M}
    otp:
      limit: ${RATELIMIT_OTP_LIMIT:3}
      window: ${RATELIMIT_OTP_WINDOW:PT1H}
  # Scheduled jobs (Story 7.2, architecture §10). admin-service is the jobs host (@EnableScheduling).
  jobs:
    offer-expiry:
      # Daily at 02:00. PENDING offers past their acceptance deadline -> EXPIRED (idempotent).
      cron: ${OFFER_EXPIRY_CRON:0 0 2 * * *}
    email-outbox-flush:
      # Every 5 minutes (Story 8.2). PENDING emailOutbox rows -> sent via SMTP (idempotent; dead-letter at 5 attempts).
      cron: ${EMAIL_OUTBOX_FLUSH_CRON:0 */5 * * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# JWT signing secret — override in prod via JWT_SECRET env var (must be >= 32 bytes for HS256).
security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-0123456789-abcdefghijklmnop}
